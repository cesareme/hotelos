name: CI

# Build + typecheck + deployment-critical checks on every push to main and
# every PR. All three workspaces typecheck cleanly: packages/ui,
# apps/admin-web and apps/api. The build, env validation, contract tests,
# smoke test and Docker image builds are the production gates.
#
# This is a pnpm monorepo (pnpm-lock.yaml v9 + workspace:* protocol). Using
# `npm ci` here aborted with EUNSUPPORTEDPROTOCOL, so the gate never ran green.
# pnpm/action-setup reads the version from the root packageManager field.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build admin-web (production)
        run: pnpm --filter @hotelos/admin-web build

  typecheck-strict:
    name: Typecheck (strict packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Typecheck @hotelos/ui
        run: pnpm --filter @hotelos/ui typecheck
      - name: Typecheck admin-web
        run: pnpm --filter @hotelos/admin-web typecheck
      - name: Typecheck API
        run: pnpm --filter @hotelos/api typecheck

  validate-env:
    name: Validate deployment env contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Validate required environment variables
        env:
          # Provide dummy values so the validator can confirm every required
          # variable is listed without failing the deploy gate in CI.
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-jwt-secret-32-chars-min-aaaaaaaa
          ENCRYPTION_KEY: ci-encryption-key-32-chars-min-aaaa
          OBJECT_STORAGE_BUCKET: ci-bucket
          AI_PROVIDER_API_KEY: ci-ai-key
          SES_HOSPEDAJES_CLIENT_SECRET: ci-ses-secret
          APP_PUBLIC_API_URL: https://api.example.com
          SENTRY_DSN: https://example@sentry.example.com/0
        run: pnpm validate:env

  design-system-drift:
    name: Design-system drift report (report-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Design system drift report (audit 2026-06 R2 · #10)
        # Report-only until the Aurora/Cocoa decision is finalised. Once a
        # canonical DS is declared, change to:  pnpm ds:drift --enforce
        run: pnpm ds:drift || true

  contract-tests:
    name: Contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run contract tests
        run: pnpm test

  smoke-demo:
    name: Smoke test demo preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Smoke test the demo preview
        run: pnpm smoke:demo

  integration-tests:
    name: Integration tests (app.inject + Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      JWT_SECRET: ci-jwt-secret-32-chars-min-aaaaaaaa
      ENCRYPTION_KEY: ci-encryption-key-32-chars-min-aaaa
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter @hotelos/database db:generate
      - name: Push schema to the test database
        run: pnpm --filter @hotelos/database exec prisma db push --skip-generate
      - name: Run integration tests (app.inject)
        run: pnpm test:integration

  docker-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.api
          push: false
          tags: hotelos-api:ci
      - name: Build AI Gateway image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.ai-gateway
          push: false
          tags: hotelos-ai-gateway:ci
      - name: Build Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.worker
          push: false
          tags: hotelos-worker:ci
      - name: Build admin-web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.admin-web
          push: false
          tags: hotelos-admin-web:ci
