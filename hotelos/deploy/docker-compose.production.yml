# HotelOS production stack · Hostinger VPS (or any Docker-capable host)
#
# Brings up Postgres, Redis, the Fastify API, the Vite-built admin SPA, and
# Caddy in front for automatic HTTPS via Let's Encrypt. Designed to be
# rebuildable from scratch on a fresh Ubuntu 24.04 box in under 15 minutes.
#
# Usage:
#   cp deploy/.env.production.example deploy/.env.production
#   nano deploy/.env.production           # fill in real secrets
#   docker compose -f deploy/docker-compose.production.yml --env-file deploy/.env.production up -d
#
# The stack is multi-tenant by default: one API + one Postgres serves every
# client. Tenancy is row-level (organizationId / propertyId), driven by the
# Super-Admin Console (sidebar → Admin & Developer → "Consola de tenants").
#
# Backups: Postgres is dumped nightly via the `postgres-backup` sidecar (see
# below). Redis persists with AOF.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hotelos}
      POSTGRES_USER: ${POSTGRES_USER:-hotelos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Tuned for a 16 GB VPS. Bump shared_buffers + work_mem if you upgrade.
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command:
      - postgres
      - -c
      - shared_buffers=2GB
      - -c
      - effective_cache_size=8GB
      - -c
      - work_mem=32MB
      - -c
      - maintenance_work_mem=512MB
      - -c
      - max_connections=200
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hotelos} -d ${POSTGRES_DB:-hotelos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # AOF persistence so queue state survives reboots.
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "1gb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-hotelos}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hotelos}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      AI_PROVIDER_API_KEY: ${AI_PROVIDER_API_KEY:-}
      OCR_PROVIDER_API_KEY: ${OCR_PROVIDER_API_KEY:-}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      VERIFACTU_MODE: ${VERIFACTU_MODE:-sandbox}
      SES_HOSPEDAJES_MODE: ${SES_HOSPEDAJES_MODE:-sandbox}
      # audit 2026-06 R2 · H2: detras de Caddy hay que confiar en X-Forwarded-For
      # o el rate-limit colapsa todas las peticiones a la IP de Caddy (DoS auto-infligido).
      TRUST_PROXY: "1"
      # audit 2026-06 R2 · H1: esta es la UNICA instancia que corre los 5 schedulers
      # in-process (SES/pace/allotment/cutoff/mailbox). Con >1 replica pon false en las demas.
      RUN_SCHEDULERS: ${RUN_SCHEDULERS:-true}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 6
    networks:
      - internal
      - web

  # Worker · jobs pg-boss (verifactu.retry, webhooks.deliver). audit 2026-06 R2 · H1:
  # sin este servicio, una factura que falla el 1er envio a la AEAT se queda en
  # 'retrying' para siempre = incumplimiento fiscal silencioso. Corre los jobs de cola,
  # NO los schedulers in-process (esos van en la api).
  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-hotelos}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hotelos}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      VERIFACTU_MODE: ${VERIFACTU_MODE:-sandbox}
      SES_HOSPEDAJES_MODE: ${SES_HOSPEDAJES_MODE:-sandbox}
      SENTRY_DSN: ${SENTRY_DSN:-}
      # El worker no corre los schedulers in-process (evita duplicar con la api).
      RUN_SCHEDULERS: "false"
    networks:
      - internal

  admin-web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.admin-web
      args:
        VITE_API_URL: ${PUBLIC_API_URL:-https://app.hotelos.app/api}
    restart: unless-stopped
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-app.hotelos.app}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
      - admin-web
    networks:
      - web

  # Optional: nightly Postgres dumps to ./postgres-backups (kept 14 days).
  # The host-side cron in deploy/scripts/install-cron.sh wires this in.
  postgres-backup:
    image: postgres:16-alpine
    restart: "no"
    profiles: ["backup"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    entrypoint: >
      sh -c "pg_dump -h postgres -U ${POSTGRES_USER:-hotelos} -d ${POSTGRES_DB:-hotelos} -F c
             -f /backups/dump-$$(date +%Y%m%d_%H%M%S).pgcustom &&
             find /backups -name 'dump-*.pgcustom' -mtime +14 -delete"
    volumes:
      - ./postgres-backups:/backups
    networks:
      - internal

networks:
  internal:
    driver: bridge
  web:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
